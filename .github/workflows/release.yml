name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build DMG
        run: ./gradlew :composeApp:packageReleaseDmg
      - uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build MSI
        run: ./gradlew :composeApp:packageReleaseMsi
      - uses: actions/upload-artifact@v4
        with:
          name: msi
          path: composeApp/build/compose/binaries/main-release/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build DEB
        run: ./gradlew :composeApp:packageReleaseDeb
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: composeApp/build/compose/binaries/main-release/deb/*.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
